<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Evaluasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #fcebd7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- RESPONSIVE SIDEBAR CONFIGURATION --- */
        .sidebar { 
            height: 100vh; width: 250px; position: fixed; top: 0; left: 0; 
            background-color: #ff9f43; padding-top: 20px; color: #000000; z-index: 1000; 
            transition: all 0.3s;
        }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.15); }
        .sidebar-header h5 { color: #000000 !important; }
        .logo-main { width: 60px; margin-bottom: 10px; }
        
        .nav-link { 
            color: #000000 !important; padding: 15px 25px; display: flex; align-items: center; 
            gap: 15px; font-weight: 600; text-decoration: none; transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { background-color: rgba(0,0,0,0.1); color: #000000 !important; }
        .logout-link { position: absolute; bottom: 20px; width: 100%; }

        /* Main Content Default Space */
        .main-content { margin-left: 250px; padding: 30px; transition: all 0.3s; }

        /* Top Header */
        .top-header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; 
            background-color: #ffbd7e; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .dashboard-title { color: #000000; font-weight: 800; font-size: 2.2rem; margin-bottom: 0; display: flex; align-items: center; gap: 10px; }
        .logo-ptsp-header { height: 50px; width: auto; object-fit: contain; }

        /* Filter Controls */
        .filter-wrapper { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .filter-input { 
            background-color: #ffbd7e; border: none; border-radius: 50px; 
            padding: 8px 20px; outline: none; cursor: pointer; font-weight: 500; color: #333;
        }
        
        /* Cards & Tables */
        .report-card { background-color: #ffbd7e; border-radius: 15px; padding: 25px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table th { border-bottom: 2px solid #ff7a30 !important; text-transform: uppercase; font-size: 0.8rem; color: #000000; }
        
        /* Action Buttons Flex Layout */
        .action-cell { display: flex; gap: 6px; justify-content: center; flex-wrap: nowrap; }
        .btn-edit { background-color: #ffeb3b; color: #333; border: none; border-radius: 10px; font-size: 0.75rem; font-weight: bold; padding: 6px 14px; text-decoration: none; transition: 0.2s; white-space: nowrap; }
        .btn-edit:hover { background-color: #fdd835; color: #000; }
        .btn-unduh { background-color: #ff1900; color: white; border: none; border-radius: 10px; font-size: 0.75rem; font-weight: bold; padding: 6px 14px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-unduh:hover { background-color: #ff1900; }
        .btn-delete { background-color: #7f8c8d; color: white; border: none; border-radius: 10px; font-size: 0.75rem; font-weight: bold; padding: 6px 14px; cursor: pointer; transition: 0.2s; }
        .btn-delete:hover { background-color: #95a5a6; }
        
        /* MENGUBAH TULISAN UNDUH RANGKUMAN MENJADI HITAM */
        .btn-unduh-semua { background-color: #27ae60; color: #000000 !important; border: none; border-radius: 50px; padding: 8px 25px; font-weight: bold; transition: 0.2s; font-size: 0.9rem; white-space: nowrap; }
        .btn-unduh-semua:hover { background-color: #2ecc71; }

        /* --- MEDIA QUERIES (Handphone & Tablet) --- */
        @media (max-width: 991.98px) {
            .sidebar { 
                height: auto; width: 100%; position: relative; padding-top: 0; display: flex; flex-direction: column; 
            }
            .sidebar-header { padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: none; }
            .logo-main { width: 40px; margin-bottom: 0; }
            
            .sidebar nav { display: flex; flex-wrap: wrap; justify-content: center; background-color: #e68a2e; width: 100%; margin-top: 0 !important; }
            .nav-link { padding: 10px 15px; font-size: 0.9rem; }
            .logout-link { position: relative; bottom: 0; width: auto; background-color: #d47a1e; text-align: center; }

            .main-content { margin-left: 0; padding: 15px; }

            .top-header { flex-direction: column; text-align: center; gap: 10px; padding: 15px; }
            .dashboard-title { font-size: 1.8rem; flex-direction: column; }

            .filter-wrapper { flex-direction: column; gap: 10px; }
            .filter-input, .btn-unduh-semua { width: 100%; text-align: center; justify-content: center; }
        }

        @media (max-width: 575.98px) {
            .sidebar nav { grid-template-columns: 1fr 1fr; display: grid; }
            .nav-link { justify-content: center; border: 1px solid rgba(0,0,0,0.1); }
            .logout-link { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/jkt.png" alt="Logo" class="logo-main">
            <h5 class="fw-bold mb-0">e - Evaluasi</h5>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door-fill"></i> Dashboard</a>
            <a href="dt_pjlp.html" class="nav-link"><i class="bi bi-people-fill"></i> Data PJLP</a>
            <a href="evaluasi.html" class="nav-link"><i class="bi bi-journal-check"></i> Evaluasi PJLP</a>
            <a href="laporan.html" class="nav-link active"><i class="bi bi-file-earmark-text"></i> Laporan Evaluasi</a>
            <div class="logout-link">
                <a href="login.html" class="nav-link justify-content-center text-dark fw-bold"><i class="bi bi-box-arrow-left"></i> Log Out</a>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1 class="dashboard-title"><img src="img/ptsp.png" alt="Logo" class="logo-ptsp-header"> Laporan Evaluasi</h1> 
            <div class="fw-bold text-dark"><i class="bi bi-person-circle"></i> Ka. Subbag TU</div>
        </div>

        <div class="row align-items-center mb-3">
            <div class="col-md-12">
                <div class="filter-wrapper">
                    <select id="filterNama" class="filter-input" onchange="renderLaporan()">
                        <option value="semua">Semua Nama</option>
                    </select>
                    
                    <select id="filterTahun" class="filter-input" onchange="renderLaporan()">
                        <option value="2026">Tahun 2026</option>
                    </select>
                    
                    <button class="btn-unduh-semua" onclick="unduhSemuaPDF()"><i class="bi bi-printer-fill me-1"></i> Unduh Rangkuman</button>
                </div>
            </div>
        </div>

        <div class="report-card">
            <h5 class="fw-bold mb-3 text-dark">Hasil Evaluasi</h5>
            <div class="table-responsive">
                <table class="table table-borderless align-middle">
                    <thead>
                        <tr>
                            <th class="text-dark">Bulan</th>
                            <th class="text-dark">NIP</th>
                            <th class="text-dark">Nama</th>
                            <th class="text-dark">Jabatan</th>
                            <th class="text-dark">Nilai</th>
                            <th class="text-dark">Keterangan</th>
                            <th class="text-center text-dark">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelLaporanBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let dataAktifTerfilter = [];

        document.addEventListener("DOMContentLoaded", () => {
            inisialisasiFilterNama();
            renderLaporan();
        });

        function inisialisasiFilterNama() {
            const dataEvaluasiList = JSON.parse(localStorage.getItem('evaluasi_data')) || [];
            const selectNama = document.getElementById("filterNama");
            
            const namaUnik = [...new Set(dataEvaluasiList.map(item => item.nama))].filter(Boolean);
            
            namaUnik.forEach(nama => {
                const option = document.createElement("option");
                option.value = nama.toLowerCase();
                option.textContent = nama;
                selectNama.appendChild(option);
            });
        }

        function renderLaporan() {
            const dataEvaluasiList = JSON.parse(localStorage.getItem('evaluasi_data')) || [];
            const tbody = document.getElementById("tabelLaporanBody");
            
            const filterNama = document.getElementById("filterNama").value;
            const filterTahun = document.getElementById("filterTahun").value;
            
            tbody.innerHTML = ""; 
            
            dataAktifTerfilter = dataEvaluasiList.filter(data => {
                const cocokNama = filterNama === "semua" || (data.nama || "").toLowerCase() === filterNama;
                return cocokNama; 
            });
            
            if(dataAktifTerfilter.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Data laporan tidak ditemukan atau kosong.</td></tr>`;
                return;
            }

            dataAktifTerfilter.forEach((data) => {
                const row = document.createElement('tr');
                /* MENGUBAH TULISAN DI DALAM BADGE KETERANGAN MENJADI WARNA HITAM MENGGUNAKAN CLASS text-dark */
                row.innerHTML = `
                    <td class="text-dark">${data.bulan}</td>
                    <td class="text-dark">${data.nip}</td>
                    <td class="text-dark">${data.nama}</td>
                    <td class="text-dark">${data.jabatan}</td>
                    <td><b class="text-dark">${data.total}</b></td>
                    <td><span class="badge ${data.badge || 'bg-secondary'} text-dark">${data.keterangan}</span></td>
                    <td>
                        <div class="action-cell">
                            <a href="edit_nilai.html?nip=${data.nip}&bulan=${data.bulan}" class="btn-edit"><i class="bi bi-pencil-square"></i> Edit</a>
                            <button class="btn-unduh" onclick="unduhPDF('${data.nip}', '${data.bulan}')"><i class="bi bi-file-earmark-pdf-fill"></i> PDF</button>
                            <button class="btn-delete" onclick="hapusLaporan('${data.nip}', '${data.bulan}')"><i class="bi bi-trash-fill"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function hapusLaporan(nip, bulan) {
            if (confirm(`Hapus laporan ${bulan} untuk NIP ${nip}?`)) {
                let list = JSON.parse(localStorage.getItem('evaluasi_data')) || [];
                list = list.filter(x => !(String(x.nip) === String(nip) && String(x.bulan) === String(bulan)));
                localStorage.setItem('evaluasi_data', JSON.stringify(list));
                
                renderLaporan();
                
                document.getElementById("filterNama").innerHTML = '<option value="semua">Semua Nama</option>';
                inisialisasiFilterNama();
            }
        }

        function unduhPDF(nipUnduh, bulanUnduh) {
            const list = JSON.parse(localStorage.getItem('evaluasi_data')) || [];
            const data = list.find(x => String(x.nip) === String(nipUnduh) && String(x.bulan) === String(bulanUnduh));
            
            if (!data) return alert("Data tidak ditemukan!");
            cetakDokumenPDF([data], false); 
        }

        function unduhSemuaPDF() {
            if (dataAktifTerfilter.length === 0) {
                return alert("Tidak ada data laporan untuk diunduh sesuai filter saat ini.");
            }
            cetakDokumenPDF(dataAktifTerfilter, true);
        }

        function cetakDokumenPDF(dataArray, isRangkuman = false) {
            const tglCetak = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            const tahunPilihan = document.getElementById("filterTahun").value;
            let htmlIsiLaporan = "";
            
            if (isRangkuman) {
                const kelompokPegawai = {};
                dataArray.forEach(item => {
                    if (!kelompokPegawai[item.nip]) {
                        kelompokPegawai[item.nip] = {
                            nip: item.nip,
                            nama: item.nama,
                            jabatan: item.jabatan,
                            listBulan: []
                        };
                    }
                    kelompokPegawai[item.nip].listBulan.push(item);
                });

                const urutanBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

                Object.values(kelompokPegawai).forEach(pegawai => {
                    pegawai.listBulan.sort((a, b) => urutanBulan.indexOf(a.bulan) - urutanBulan.indexOf(b.bulan));

                    let barisTabelBulan = "";
                    let totalNilaiKumulatif = 0;
                    let jumlahBulan = pegawai.listBulan.length;

                    pegawai.listBulan.forEach(b => {
                        const skorTotal = parseFloat(b.total) || 0;
                        totalNilaiKumulatif += skorTotal;

                        barisTabelBulan += `
                            <tr>
                                <td style="text-align: center; font-weight: bold;">${b.bulan}</td>
                                <td>${b.rincian_absensi || 'Tersimpan'}</td>
                                <td>${b.rincian_kinerja || 'Tersimpan'}</td>
                                <td>${b.rincian_kedisiplinan || 'Tersimpan'}</td>
                                <td style="text-align: center; font-weight: bold; color: #ff7a30; font-size: 1.1rem;">${b.total}</td>
                                <td style="text-align: center;"><span style="font-weight: bold; text-transform: uppercase;"><i>${b.keterangan}</i></span></td>
                            </tr>
                        `;
                    });

                    let rataRataNilai = jumlahBulan > 0 ? (totalNilaiKumulatif / jumlahBulan).toFixed(2) : 0;
                    
                    let predikatNilai = "KURANG";
                    let statusKontrak = "TIDAK DIPERPANJANG";
                    let warnaStatus = "#e74c3c";

                    if (rataRataNilai >= 85) {
                        predikatNilai = "SANGAT BAIK";
                        statusKontrak = "DIPERPANJANG KONTRAK PJLP";
                        warnaStatus = "#27ae60";
                    } else if (rataRataNilai >= 75) {
                        predikatNilai = "BAIK";
                        statusKontrak = "DIPERPANJANG KONTRAK PJLP";
                        warnaStatus = "#27ae60";
                    } else if (rataRataNilai >= 60) {
                        predikatNilai = "CUKUP";
                        statusKontrak = "DIPERTIMBANGKAN";
                        warnaStatus = "#f39c12";
                    }

                    htmlIsiLaporan += `
                        <div class="page-break">
                            <div class="header">
                                <div class="header-left">
                                    <img src="img/jkt.png" alt="Logo">
                                    <div class="header-title">
                                        <h2>Rangkuman Evaluasi Tahunan PJLP</h2>
                                        <p>Sistem Informasi Aplikasi e-Evaluasi Internal</p>
                                    </div>
                                </div>
                                <div class="header-right">
                                    <strong>Format Dokumen:</strong> Rekap Tahunan<br>
                                    <strong>Tahun Periode:</strong> ${tahunPilihan}<br>
                                    <strong>Tanggal Cetak:</strong> ${tglCetak}
                                </div>
                            </div>

                            <div class="section-title">Profil Penyedia Jasa (PJLP)</div>
                            <table class="biodata-table">
                                <tr><td class="label">Nama Lengkap</td><td class="colon">:</td><td style="font-weight:bold; color:#ff7a30; font-size: 1.1rem;">${pegawai.nama}</td></tr>
                                <tr><td class="label">NIP / No. Reg</td><td class="colon">:</td><td>${pegawai.nip}</td></tr>
                                <tr><td class="label">Jabatan / Posisi</td><td class="colon">:</td><td>${pegawai.jabatan}</td></tr>
                                <tr><td class="label">Tahun Evaluasi</td><td class="colon">:</td><td>${tahunPilihan}</td></tr>
                            </table>

                            <div class="section-title">Rangkuman Nilai Bulanan</div>
                            <table class="score-table">
                                <thead>
                                    <tr>
                                        <th style="width: 15%; text-align: center;">Bulan</th>
                                        <th style="width: 20%;">Absensi</th>
                                        <th style="width: 20%;">Kinerja</th>
                                        <th style="width: 20%;">Kedisiplinan</th>
                                        <th style="width: 10%; text-align: center;">Total</th>
                                        <th style="width: 15%; text-align: center;">Keterangan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${barisTabelBulan}
                                    <tr class="total-row">
                                        <td colspan="4" style="text-align: right; padding-right: 20px;">RATA-RATA NILAI AKHIR (${jumlahBulan} Bulan) :</td>
                                        <td style="text-align: center; font-size: 1.2rem; color: #ff7a30; font-weight: 800;">${rataRataNilai}</td>
                                        <td></td>
                                    </tr>
                                    <tr class="total-row">
                                        <td colspan="4" style="text-align: right; padding-right: 20px;">PREDIKAT NILAI TAHUNAN :</td>
                                        <td colspan="2" style="text-align: center; font-size: 1.1rem; color: #333; font-weight: 800; text-transform: uppercase;"><i>${predikatNilai}</i></td>
                                    </tr>
                                    <tr class="total-row">
                                        <td colspan="4" style="text-align: right; padding-right: 20px;">REKOMENDASI STATUS KONTRAK :</td>
                                        <td colspan="2" style="text-align: center; font-size: 1.1rem; color: ${warnaStatus}; font-weight: 800; text-transform: uppercase;"><strong>${statusKontrak}</strong></td>
                                    </tr>
                                </tbody>
                            </table>

                            <table class="signature-container">
                                <tr>
                                    <td style="width:60%;"></td>
                                    <td>
                                        <div class="signature-box">
                                            <p>Jakarta, ${tglCetak}</p>
                                            <p><strong>Ka. Subbag TU</strong></p>
                                            <div class="signature-space"></div>
                                            <p style="text-decoration: underline; font-weight: bold; margin-bottom:0;">...........................................</p>
                                            <p style="font-size: 0.85rem; color: #555; margin-top:4px;">NIP. ...................................</p>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </div>
                    `;
                });

            } else {
                dataArray.forEach((data) => {
                    const abs = data.rincian_absensi ? (Array.isArray(data.rincian_absensi) ? data.rincian_absensi.join(', ') : data.rincian_absensi) : "Tidak ada rincian";
                    const kin = data.rincian_kinerja ? (Array.isArray(data.rincian_kinerja) ? data.rincian_kinerja.join(', ') : data.rincian_kinerja) : "Tidak ada rincian";
                    const dis = data.rincian_kedisiplinan ? (Array.isArray(data.rincian_kedisiplinan) ? data.rincian_kedisiplinan.join(', ') : data.rincian_kedisiplinan) : "Tidak ada rincian";

                    htmlIsiLaporan += `
                        <div class="page-break">
                            <div class="header">
                                <div class="header-left">
                                    <img src="img/jkt.png" alt="Logo">
                                    <div class="header-title">
                                        <h2>Laporan Evaluasi Bulanan PJLP</h2>
                                        <p>Sistem Informasi Aplikasi e-Evaluasi Internal</p>
                                    </div>
                                </div>
                                <div class="header-right">
                                    <strong>Format Dokumen:</strong> PDF Resmi<br>
                                    <strong>Tanggal Cetak:</strong> ${tglCetak}
                                </div>
                            </div>

                            <div class="section-title">Profil Penyedia Jasa (PJLP)</div>
                            <table class="biodata-table">
                                <tr><td class="label">Nama Lengkap</td><td class="colon">:</td><td style="font-weight:bold; color:#ff7a30; font-size: 1.1rem;">${data.nama}</td></tr>
                                <tr><td class="label">NIP / No. Reg</td><td class="colon">:</td><td>${data.nip}</td></tr>
                                <tr><td class="label">Jabatan / Posisi</td><td class="colon">:</td><td>${data.jabatan}</td></tr>
                                <tr><td class="label">Periode Penilaian</td><td class="colon">:</td><td>${data.bulan} ${tahunPilihan}</td></tr>
                            </table>

                            <div class="section-title">Rincian Nilai Parameter Evaluasi</div>
                            <table class="score-table">
                                <thead>
                                    <tr>
                                        <th style="width: 35%;">Aspek Komponen Penilaian</th>
                                        <th style="width: 65%;">Rincian Parameter Skor / Keterangan Masukan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><strong>1. Absensi Kinerja</strong><br><small style="color:#777;">Keterlambatan, Alpha, Sakit, Cuti Tahunan</small></td>
                                        <td>${abs}</td>
                                    </tr>
                                    <tr>
                                        <td><strong>2. Capaian Kinerja</strong><br><small style="color:#777;">Orientasi Pelayanan, Inisiatif Kerja, Tanggung Jawab</small></td>
                                        <td>${kin}</td>
                                    </tr>
                                    <tr>
                                        <td><strong>3. Kedisiplinan Kerja</strong><br><small style="color:#777;">Standar Aturan SOP, Seragam Atribut, Jam Kerja</small></td>
                                        <td>${dis}</td>
                                    </tr>
                                    <tr class="total-row">
                                        <td>TOTAL EVALUASI AKHIR</td>
                                        <td class="total-score">${data.total}</td>
                                    </tr>
                                    <tr class="total-row">
                                        <td>STATUS KELULUSAN / KET</td>
                                        <td style="color: #d35400; text-transform: uppercase;"><i>${data.keterangan}</i></td>
                                    </tr>
                                </tbody>
                            </table>

                            <table class="signature-container">
                                <tr>
                                    <td style="width:60%;"></td>
                                    <td>
                                        <div class="signature-box">
                                            <p>Jakarta, ${tglCetak}</p>
                                            <p><strong>Ka. Subbag TU</strong></p>
                                            <div class="signature-space"></div>
                                            <p style="text-decoration: underline; font-weight: bold; margin-bottom:0;">...........................................</p>
                                            <p style="font-size: 0.85rem; color: #555; margin-top:4px;">NIP. ...................................</p>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </div>
                    `;
                });
            }

            const htmlContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Cetak_Laporan_Evaluasi</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; color: #333; background-color: #fff; line-height: 1.4; }
                        .page-break { page-break-after: always; margin-bottom: 50px; }
                        .page-break:last-child { page-break-after: auto; margin-bottom: 0; }
                        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #ff7a30; padding-bottom: 15px; margin-bottom: 35px; }
                        .header-left { display: flex; align-items: center; gap: 15px; }
                        .header-left img { height: 65px; }
                        .header-title h2 { margin: 0; color: #ff7a30; font-weight: 800; font-size: 1.6rem; text-transform: uppercase; }
                        .header-title p { margin: 4px 0 0 0; font-size: 0.9rem; color: #666; }
                        .header-right { text-align: right; font-size: 0.85rem; color: #555; }
