<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data PJLP - E-Evaluasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #fcebd7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100vh; width: 250px; position: fixed; top: 0; left: 0;
            background-color: #ff9f43; padding-top: 20px; color: black; z-index: 1000;
        }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .logo-main { width: 60px; margin-bottom: 10px; }
        .nav-link { 
            color: black !important; padding: 15px 25px; display: flex; align-items: center; 
            gap: 15px; font-weight: 500; text-decoration: none; transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.2); }
        .logout-link { position: absolute; bottom: 20px; width: 100%; }

        /* Main Content */
        .main-content { margin-left: 250px; padding: 30px; transition: 0.3s; }
        .top-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
            background-color: #ffbd7e; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .dashboard-title { color: #000000; font-weight: 800; font-size: 2.2rem; margin-bottom: 0; display: flex; align-items: center; gap: 15px; }
        .logo-ptsp-header { height: 50px; width: auto; object-fit: contain; }

        /* Form Container & Elements */
        .form-container { background-color: #ffbd7e; border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-control-custom { background: white; border: none; border-radius: 10px; padding: 10px 15px; width: 100%; margin-top: 5px; }
        .form-control-custom:focus { outline: 2px solid #ff7a30; }
        
        /* Photo Upload Menggunakan Flexbox / Grid */
        .photo-upload { 
            width: 150px; height: 180px; background-color: #eee; border: 2px dashed #ff7a30; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            flex-direction: column; cursor: pointer; overflow: hidden; margin: 0 auto 20px auto;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tombol Aksi */
        .btn-simpan { background-color: #84e06d; color: #333; font-weight: 800; border-radius: 50px; padding: 10px 35px; border: none; transition: 0.2s; }
        .btn-simpan:hover { background-color: #6ecc56; }
        .btn-batal { background-color: #ff0000; color: white; font-weight: 800; border-radius: 50px; padding: 10px 35px; border: none; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-batal:hover { background-color: #ff0000; color: white; }

        /* Responsif untuk Layar Kecil (Mobile) */
        @media (max-width: 991.98px) {
            .sidebar { left: -250px; } /* Opsional: menyembunyikan sidebar di hp */
            .main-content { margin-left: 0; padding: 15px; }
            .top-header { flex-direction: column; gap: 15px; text-align: center; }
            .photo-upload { margin: 0 auto 30px auto; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/jkt.png" alt="Logo" class="logo-main">
            <h5 class="fw-bold">e - Evaluasi</h5>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door-fill"></i> Dashboard</a>
            <a href="dt_pjlp.html" class="nav-link active"><i class="bi bi-people-fill"></i> Data PJLP</a>
            <a href="evaluasi.html" class="nav-link"><i class="bi bi-journal-check"></i> Evaluasi PJLP</a>
            <a href="laporan.html" class="nav-link"><i class="bi bi-file-earmark-text"></i> Laporan Evaluasi</a>
        </nav>
        <div class="logout-link">
            <a href="login.html" class="nav-link"><i class="bi bi-box-arrow-left"></i> Log Out</a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1 class="dashboard-title">
                <img src="img/ptsp.png" alt="Logo PTSP" class="logo-ptsp-header"> Tambah PJLP
            </h1> 
            <div class="fw-bold"><i class="bi bi-person-circle"></i> Ka. Subbag TU</div>
        </div>

        <div class="form-container">
            <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="previewImage(this)">

            <form onsubmit="simpanPjlpBaru(event)">
                <div class="row flex-column-reverse flex-lg-row">
                    
                    <div class="col-lg-9">
                        <div class="mb-3">
                            <label class="fw-bold" for="inputNip">NIP</label>
                            <input type="text" id="inputNip" class="form-control-custom" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold" for="inputNama">Nama Lengkap</label>
                            <input type="text" id="inputNama" class="form-control-custom" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold" for="inputJabatan">Jabatan</label>
                            <input type="text" id="inputJabatan" class="form-control-custom" required>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold" for="inputAlamat">Alamat</label>
                            <input type="text" id="inputAlamat" class="form-control-custom">
                        </div>

                        <div class="mt-4 text-center text-lg-start">
                            <a href="dt_pjlp.html" class="btn-batal me-2">Batal</a>
                            <button type="submit" class="btn-simpan">Simpan Data</button>
                        </div>
                    </div>

                    <div class="col-lg-3 text-center">
                        <label class="fw-bold d-block mb-2 d-lg-none">Foto Profil</label>
                        <div class="photo-upload" onclick="document.getElementById('fileFoto').click();" id="photoBox">
                            <i class="bi bi-camera fs-1"></i> 
                            <span>Upload Foto</span>
                        </div>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <script>
        let base64FotoStr = "";

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('photoBox').innerHTML = `<img src="${e.target.result}" alt="Foto">`;
                    base64FotoStr = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function simpanPjlpBaru(e) {
            e.preventDefault();
            
            const dataBaru = {
                id: Date.now().toString(),
                nip: document.getElementById('inputNip').value,
                nama: document.getElementById('inputNama').value,
                jabatan: document.getElementById('inputJabatan').value,
                alamat: document.getElementById('inputAlamat').value,
                foto: base64FotoStr
            };

            let listPjlp = JSON.parse(localStorage.getItem('koleksi_pjlp_baru')) || [];
            listPjlp.unshift(dataBaru);

            try {
                localStorage.setItem('koleksi_pjlp_baru', JSON.stringify(listPjlp));
                alert("Data PJLP berhasil ditambahkan!");
                window.location.href = 'dt_pjlp.html'; 
            } catch (error) {
                alert("Gagal menyimpan data! Ukuran foto terlalu besar atau memori lokal penuh.");
            }
        }
    </script>
</body>
</html>
