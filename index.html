<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Evaluasi PTSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f5f7;
            overflow-x: hidden;
        }

        /* Navigasi */
        .navbar-brand {
            font-weight: 700;
            color: #333;
        }

        /* --- BACKGROUND SHAPES DESIGN (DESKTOP) --- */
        .shape-yellow {
            position: absolute;
            right: -10%;
            top: 10%;
            width: 50vw;
            height: 80vh;
            background-color: #ffc266;
            border-radius: 500px 0 0 500px;
            z-index: -1;
            transition: all 0.3s;
        }

        .shape-orange {
            position: absolute;
            right: -25%;
            top: 15%;
            width: 40vw;
            height: 70vh;
            background-color: #ff8533;
            border-radius: 50%;
            z-index: -2;
            transition: all 0.3s;
        }

        /* Hero Content */
        .hero-section {
            min-height: calc(100vh - 80px); /* Adaptasi tinggi responsif pasca navbar */
            display: flex;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        /* Menggunakan kustomisasi ukuran yang fleksibel */
        .main-title {
            font-size: calc(2.5rem + 2vw); /* Skala ukuran otomatis mengikuti lebar monitor */
            font-weight: 800;
            color: #1a2b3c;
            line-height: 1.1;
        }

        .sub-title {
            font-size: calc(3.8rem + 3vw);
            font-weight: 800;
            color: #ff7a30;
            margin-top: -5px;
            line-height: 0.9;
        }

        /* Card Deskripsi */
        .info-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px); /* Efek blur modern di belakang kartu */
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            max-width: 340px;
            position: relative;
        }

        .info-card p {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 0;
            padding-right: 25px;
        }

        .arrow-icon {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 1.5rem;
            transform: rotate(45deg);
        }

        /* Footer Element */
        .footer-badge {
            background-color: #1a2b3c;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            margin-top: 30px;
        }

        .footer-badge span {
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .login-link {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            border: 1px solid transparent;
            padding: 6px 18px;
            border-radius: 50px;
            transition: 0.2s;
        }
        .login-link:hover {
            border-color: #ff7a30;
            color: #ff7a30;
        }

        /* --- MEDIA QUERIES (Handphone & Tablet) --- */
        @media (max-width: 991.98px) {
            /* Mengecilkan bulatan background agar tidak menutupi teks di layar kecil */
            .shape-yellow {
                width: 70vw;
                height: 50vh;
                right: -20%;
                top: 50%;
                border-radius: 50%;
                opacity: 0.6;
            }
            .shape-orange {
                width: 60vw;
                height: 45vh;
                right: -30%;
                top: 55%;
                opacity: 0.5;
            }

            .hero-section {
                text-align: center; /* Meratakan text ke tengah agar estetik di HP */
                align-items: flex-start;
                padding-top: 60px;
            }

            .info-card {
                margin: 24px auto 0 auto; /* Menengahkan posisi card di bawah judul */
            }
        }

        @media (max-width: 575.98px) {
            .main-title { font-size: 2.3rem; }
            .sub-title { font-size: 3.8rem; }
            
            .shape-yellow, .shape-orange {
                display: none; /* Menyembunyikan shape dekoratif jika layar terlalu sempit agar bersih */
            }
            body {
                background: linear-gradient(135deg, #f4f5f7 70%, #ffcbd1 100%); /* Alternatif background soft */
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-light bg-transparent pt-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <div class="d-flex me-2" style="gap: 2px;">
                    <img src="img/home.png" style="height: 20px; width: auto;" alt="Home Icon">
                </div>
                DPMPTSP
            </a>
            <a href="login.html" class="login-link">Log In</a>
        </div>
    </nav>

    <div class="hero-section">
        <div class="shape-yellow"></div>
        <div class="shape-orange"></div>

        <div class="container">
            <div class="row">
                <div class="col-12 col-lg-7">
                    <h1 class="main-title mb-0">E - EVALUASI</h1>
                    <h2 class="sub-title">PTSP</h2>
                    
                    <div class="info-card mt-4">
                        <p>Website Penilaian kinerja PJLP UP PMPTSP Jakarta Utara</p>
                        <div class="arrow-icon">→</div>
                    </div>

                    <div class="footer-badge">
                        <span>@jakarta.go.id</span>
                        <img src="img/jkt.png" alt="Logo Jakarta" style="height: 20px; width: auto;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
