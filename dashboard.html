<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - E-Evaluasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #fcebd7; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* --- RESPONSIVE SIDEBAR CONFIGURATION --- */
        .sidebar { 
            height: 100vh; 
            width: 250px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            background-color: #ff9f43; 
            padding-top: 20px; 
            color: #000000; /* PERBAIKAN: Mengubah teks header sidebar menjadi hitam */
            z-index: 1000; 
            transition: all 0.3s;
        }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.15); }
        .logo-main { width: 60px; margin-bottom: 10px; }
        
        /* PERBAIKAN: Mengubah warna default teks & ikon link menjadi hitam */
        .nav-link { 
            color: #000000 !important; 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-weight: 500; 
            text-decoration: none; 
            transition: 0.3s; 
        }
        
        /* PERBAIKAN: Mengubah background hover agar teks hitam tetap terbaca jelas */
        .nav-link:hover, .nav-link.active { background-color: rgba(0, 0, 0, 0.1); }
        .logout-link { position: absolute; bottom: 20px; width: 100%; }
        
        /* Main Content Default (Desktop) */
        .main-content { margin-left: 250px; padding: 30px; min-height: 100vh; transition: all 0.3s; }
        
        /* Utilities & Cards */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background-color: #ffbd7e; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dashboard-title { color: #000000; font-weight: 800; font-size: 2.2rem; margin-bottom: 0; display: flex; align-items: center; gap: 10px; }
        .logo-ptsp-header { height: 50px; width: auto; object-fit: contain; }
        .stat-card { background-color: #ffbd7e; border-radius: 15px; padding: 20px; height: 100%; border: none; display: flex; align-items: center; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 2.5rem; font-weight: 800; margin: 0; }
        .data-container { background-color: #ffbd7e; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; }
        .table thead th { border-bottom: 2px solid #ff9f43; text-transform: uppercase; font-size: 0.8rem; padding-bottom: 12px; }
        .chart-container { position: relative; height: 250px; width: 100%; }

        /* --- MEDIA QUERIES (Handphone & Tablet) --- */
        @media (max-width: 991.98px) {
            .sidebar {
                height: auto;
                width: 100%;
                position: relative;
                padding-top: 0;
                display: flex;
                flex-direction: column;
            }
            .sidebar-header {
                padding: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                border-bottom: none;
            }
            .logo-main { width: 40px; margin-bottom: 0; }
            
            .sidebar nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                background-color: #e68a2e; 
                width: 100%;
                margin-top: 0 !important;
            }
            .nav-link {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            .logout-link {
                position: relative;
                bottom: 0;
                width: auto;
                background-color: #d47a1e;
                text-align: center;
            }
            
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            
            .top-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
                padding: 15px;
            }
            .dashboard-title {
                font-size: 1.8rem;
                flex-direction: column;
            }
        }

        @media (max-width: 575.98px) {
            .sidebar nav {
                grid-template-columns: 1fr 1fr;
                display: grid;
            }
            /* PERBAIKAN: Mengatur border pemisah di hp agar senada dengan teks hitam */
            .nav-link {
                justify-content: center;
                border: 1px solid rgba(0,0,0,0.05);
            }
            .logout-link {
                grid-column: span 2;
            }
            .stat-card {
                padding: 15px;
            }
            .stat-card h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/jkt.png" alt="Logo" class="logo-main">
            <h5 class="fw-bold mb-0">e - Evaluasi</h5>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link active"><i class="bi bi-house-door-fill"></i> Dashboard</a>
            <a href="dt_pjlp.html" class="nav-link"><i class="bi bi-people-fill"></i> Data PJLP</a>
            <a href="evaluasi.html" class="nav-link"><i class="bi bi-journal-check"></i> Evaluasi PJLP</a>
            <a href="laporan.html" class="nav-link"><i class="bi bi-file-earmark-text"></i> Laporan</a>
            <div class="logout-link">
                <a href="login.html" class="nav-link justify-content-center"><i class="bi bi-box-arrow-left"></i> Log Out</a>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1 class="dashboard-title"><img src="img/ptsp.png" alt="Logo" class="logo-ptsp-header"> Dashboard</h1> 
            <div class="fw-bold"><i class="bi bi-person-circle"></i> Ka. Subbag TU</div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-xl-4">
                <div class="stat-card">
                    <div><h2 id="totalPjlp">0</h2><p class="fw-bold mb-0">Total PJLP</p></div>
                    <i class="bi bi-people fs-1 opacity-50"></i>
                </div>
            </div>
            <div class="col-sm-6 col-xl-4">
                <div class="stat-card">
                    <div><h2 id="totalEvaluasi">0</h2><p class="fw-bold mb-0">Sudah Dievaluasi</p></div>
                    <i class="bi bi-journal-check fs-1 opacity-50"></i>
                </div>
            </div>
            <div class="col-12 col-sm-12 col-xl-4">
                <div class="stat-card">
                    <div><h2 id="persenSangatBaik">0 %</h2><p class="fw-bold mb-0">Predikat Sangat Baik</p></div>
                    <i class="bi bi-star-fill fs-1 opacity-50"></i>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="data-container text-center">
                    <h5 class="fw-bold mb-4">Statistik Predikat</h5>
                    <div class="chart-container">
                        <canvas id="predikatChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="data-container">
                    <h5 class="fw-bold mb-3">PJLP Terbaru</h5>
                    <div class="table-responsive">
                        <table class="table table-borderless align-middle" style="min-width: 400px;">
                            <thead>
                                <tr><th>NIP</th><th>Nama</th><th>Jabatan</th><th class="text-center">Status</th></tr>
                            </thead>
                            <tbody id="tabelDashboardBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const listPjlp = JSON.parse(localStorage.getItem('koleksi_pjlp_baru')) || [];
            const listEvaluasi = JSON.parse(localStorage.getItem('evaluasi_data')) || [];

            document.getElementById('totalPjlp').innerText = listPjlp.length;
            document.getElementById('totalEvaluasi').innerText = listEvaluasi.length;

            const validEvaluasi = listEvaluasi.filter(e => e && e.keterangan && e.keterangan.trim() !== "");
            const stats = { "Sangat Baik": 0, "Baik": 0, "Cukup Baik": 0 };
            
            validEvaluasi.forEach(e => {
                const predikat = e.keterangan.trim();
                if (stats.hasOwnProperty(predikat)) {
                    stats[predikat]++;
                }
            });

            const totalValid = validEvaluasi.length;
            const sangatBaikCount = stats["Sangat Baik"];
            const persen = totalValid > 0 ? Math.round((sangatBaikCount / totalValid) * 100) : 0;
            
            document.getElementById('persenSangatBaik').innerText = persen + " %";

            const ctx = document.getElementById('predikatChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Sangat Baik', 'Baik', 'Cukup Baik'],
                    datasets: [{
                        data: [stats["Sangat Baik"], stats["Baik"], stats["Cukup Baik"]],
                        backgroundColor: ['#0d6efd', '#198754', '#ffc107'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom' } } 
                }
            });

            const tbody = document.getElementById('tabelDashboardBody');
            tbody.innerHTML = "";
            const previewData = [...listPjlp].reverse().slice(0, 5);
            
            if (previewData.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' class='text-center'>Belum ada data PJLP yang diinput.</td></tr>";
            } else {
                previewData.forEach(pjlp => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${pjlp.nip || '-'}</td>
                            <td>${pjlp.nama || '-'}</td>
                            <td>${pjlp.jabatan || '-'}</td>
                            <td class="text-center">
                                <a href="dt_pjlp.html?search=${pjlp.nama}" title="Lihat Data PJLP">
                                    <i class="bi bi-search search-icon fs-5"></i>
                                </a>
                            </td>
                        </tr>
                    `;
                });
            }
        });
    </script>
</body>
</html>
