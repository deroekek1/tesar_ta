<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data PJLP - E-Evaluasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #fcebd7; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- RESPONSIVE SIDEBAR CONFIGURATION --- */
        .sidebar {
            height: 100vh; width: 250px; position: fixed; top: 0; left: 0;
            background-color: #ff9f43; padding-top: 20px; color: black; z-index: 1000;
            transition: all 0.3s;
        }
        .sidebar-header { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .logo-main { width: 60px; margin-bottom: 10px; }
        .nav-link { 
            color: black !important; padding: 15px 25px; display: flex; align-items: center; 
            gap: 15px; font-weight: 500; text-decoration: none; transition: 0.3s; 
        }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.2); }
        .logout-link { position: absolute; bottom: 20px; width: 100%; }

        /* Main Content Default (Desktop) */
        .main-content { margin-left: 250px; padding: 30px; transition: all 0.3s; }
        
        /* Utilities & Header */
        .top-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
            background-color: #ffbd7e; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .dashboard-title { color: #000000; font-weight: 800; font-size: 2.2rem; margin-bottom: 0; display: flex; align-items: center; gap: 10px; }
        .logo-ptsp-header { height: 50px; width: auto; object-fit: contain; }

        /* Form Container - Menggunakan fleksibilitas Grid modern (bukan absolute lagi) */
        .form-container { background-color: #ffbd7e; border-radius: 20px; padding: 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-control-custom { background: white; border: none; border-radius: 10px; padding: 10px 15px; width: 100%; margin-top: 5px; }
        
        /* Modifikasi layout Box Foto agar responsif */
        .photo-upload { 
            width: 150px; height: 180px; background-color: #eee; border: 2px dashed #ff7a30; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            flex-direction: column; cursor: pointer; overflow: hidden; margin: 0 auto;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-simpan { background-color: #84e06d; color: #333; font-weight: 800; border-radius: 50px; padding: 10px 35px; border: none; }
        .btn-batal { background-color: #ff0000; color: white; font-weight: 800; border-radius: 50px; padding: 10px 35px; border: none; text-decoration: none; display: inline-block; }

        /* --- MEDIA QUERIES (Handphone & Tablet) --- */
        @media (max-width: 991.98px) {
            .sidebar {
                height: auto; width: 100%; position: relative; padding-top: 0; display: flex; flex-direction: column;
            }
            .sidebar-header {
                padding: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: none;
            }
            .logo-main { width: 40px; margin-bottom: 0; }
            
            .sidebar nav {
                display: flex; flex-wrap: wrap; justify-content: center; background-color: #e68a2e; width: 100%; margin-top: 0 !important;
            }
            .nav-link { padding: 10px 15px; font-size: 0.9rem; }
            .logout-link { position: relative; bottom: 0; width: auto; background-color: #d47a1e; text-align: center; }
            
            .main-content { margin-left: 0; padding: 15px; }
            
            .top-header { flex-direction: column; text-align: center; gap: 10px; padding: 15px; }
            .dashboard-title { font-size: 1.8rem; flex-direction: column; }
            
            .form-container { padding: 25px; }
        }

        @media (max-width: 575.98px) {
            .sidebar nav { grid-template-columns: 1fr 1fr; display: grid; }
            .nav-link { justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
            .logout-link { grid-column: span 2; }
            
            .action-buttons { display: flex; flex-direction: column; gap: 10px; }
            .btn-batal, .btn-simpan { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="img/jkt.png" alt="Logo" class="logo-main">
            <h5 class="fw-bold mb-0">e - Evaluasi</h5>
        </div>
        <nav class="mt-4">
            <a href="dashboard.html" class="nav-link"><i class="bi bi-house-door-fill"></i> Dashboard</a>
            <a href="dt_pjlp.html" class="nav-link active"><i class="bi bi-people-fill"></i> Data PJLP</a>
            <a href="evaluasi.html" class="nav-link"><i class="bi bi-journal-check"></i> Evaluasi PJLP</a>
            <a href="laporan.html" class="nav-link"><i class="bi bi-file-earmark-text"></i> Laporan</a>
            <div class="logout-link">
                <a href="login.html" class="nav-link justify-content-center"><i class="bi bi-box-arrow-left"></i> Log Out</a>
            </div>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1 class="dashboard-title"><img src="img/ptsp.png" alt="Logo PTSP" class="logo-ptsp-header"> Edit Data</h1> 
            <div class="fw-bold"><i class="bi bi-person-circle"></i> Ka. Subbag TU</div>
        </div>

        <div class="form-container">
            <input type="file" id="fileFoto" accept="image/*" style="display: none;" onchange="previewFoto(this)">
            
            <div class="row g-4 flex-column-reverse flex-md-row">
                <div class="col-12 col-md-8 col-lg-9">
                    <form onsubmit="perbaruiPjlp(event)">
                        <div class="mb-3">
                            <label class="fw-bold">NIP</label>
                            <input type="text" id="editNip" class="form-control-custom" readonly style="background-color: #e9ecef;">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Nama Lengkap</label>
                            <input type="text" id="editNama" class="form-control-custom" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Jabatan</label>
                            <input type="text" id="editJabatan" class="form-control-custom" required>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold">Alamat</label>
                            <input type="text" id="editAlamat" class="form-control-custom">
                        </div>

                        <div class="mt-4 action-buttons">
                            <a href="dt_pjlp.html" class="btn-batal">Batal</a>
                            <button type="submit" class="btn-simpan">Perbarui Data</button>
                        </div>
                    </form>
                </div>
                
                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <label class="fw-bold d-block mb-2 d-md-none">Foto Pegawai</label>
                    <div class="photo-upload" id="photoBox" onclick="document.getElementById('fileFoto').click();">
                        <i class="bi bi-camera fs-1"></i> <span>Ganti Foto</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let base64Foto = "";
        const nip = new URLSearchParams(window.location.search).get('nip');

        document.addEventListener("DOMContentLoaded", function() {
            let data = JSON.parse(localStorage.getItem('koleksi_pjlp_baru')) || [];
            let p = data.find(x => x.nip === nip);
            if (p) {
                document.getElementById('editNip').value = p.nip;
                document.getElementById('editNama').value = p.nama;
                document.getElementById('editJabatan').value = p.jabatan;
                document.getElementById('editAlamat').value = p.alamat || "";
                if (p.foto) {
                    document.getElementById('photoBox').innerHTML = `<img src="${p.foto}" alt="Foto">`;
                    base64Foto = p.foto;
                }
            }
        });

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('photoBox').innerHTML = `<img src="${e.target.result}" alt="Foto">`;
                    base64Foto = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function perbaruiPjlp(e) {
            e.preventDefault();
            let data = JSON.parse(localStorage.getItem('koleksi_pjlp_baru'));
            let index = data.findIndex(p => p.nip === nip);
            
            data[index].nama = document.getElementById('editNama').value;
            data[index].jabatan = document.getElementById('editJabatan').value;
            data[index].alamat = document.getElementById('editAlamat').value;
            if (base64Foto) data[index].foto = base64Foto;
            
            localStorage.setItem('koleksi_pjlp_baru', JSON.stringify(data));
            alert("Data berhasil diperbarui!");
            window.location.href = 'dt_pjlp.html';
        }
    </script>
</body>
</html>
