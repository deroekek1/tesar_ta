<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Evaluasi PTSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffb347; /* Background kuning/oranye muda */
            overflow-x: hidden; /* Mengubah overflow-y agar tidak macet di HP */
        }

        /* Elemen Lingkaran Oranye Besar */
        .circle-bg {
            position: absolute;
            right: -10%;
            top: 50%;
            transform: translateY(-50%);
            width: 80vw;
            height: 120vh;
            background-color: #f77f00; /* Oranye lebih gelap */
            border-radius: 50%;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Sisi Kiri: Teks */
        .brand-section {
            color: white;
            padding-left: 50px;
        }

        .brand-section h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0;
        }

        .brand-section h2 {
            font-size: 5rem;
            font-weight: 800;
            margin-top: -10px;
        }

        /* Sisi Kanan: Kartu Login */
        .login-card {
            background-color: #ffe8d6; /* Warna krem */
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            margin: auto;
        }

        .logo-jakarta {
            width: 80px;
            margin-bottom: 20px;
        }

        .login-card h3 {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #333;
        }

        /* Perbaikan Form: Input Group Rounded Lengkap */
        .custom-input-group {
            background-color: white;
            border-radius: 50px;
            overflow: hidden;
            padding-right: 10px;
        }

        .custom-input-group .form-control {
            border: none;
            border-radius: 50px 0 0 50px;
            padding: 12px 20px;
            box-shadow: none;
        }

        .custom-input-group .input-group-text {
            background-color: white;
            border: none;
            color: #6c757d;
        }

        /* Tombol Login */
        .btn-login {
            background-color: #4cc9f0; /* Biru muda */
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #4895ef;
            color: white;
        }

        .logo-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 3; /* Supaya tidak tertutup lingkaran */
        }

        /* Responsif untuk HP */
        @media (max-width: 991.98px) {
            .circle-bg {
                width: 150vw;
                height: 150vw;
                top: 20%;
                right: -25%;
            }
            .login-container {
                padding: 80px 20px 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="circle-bg"></div>

    <div class="logo-top-left text-white">
        <span class="bg-light d-inline-block" style="width: 12px; height: 24px; border-radius: 10px 0 0 10px;"></span>
        <span class="bg-light d-inline-block" style="width: 12px; height: 24px; border-radius: 0 10px 10px 0;"></span>
        <span class="fw-bold">DPM PTSP</span>
    </div>

    <div class="container login-container">
        <div class="row w-100 align-items-center g-0">
            <div class="col-lg-6 brand-section d-none d-lg-block">
                <p class="fs-4 mb-0">*</p>
                <h1>E - EVALUASI</h1>
                <h2>PTSP <i class="bi bi-arrow-up-right fs-1"></i></h2>
            </div>

            <div class="col-lg-6">
                <div class="login-card">
                    <img src="img/jkt.png" alt="Logo Jakarta" class="logo-jakarta">
                    
                    <h3>LOG IN USER</h3>

                    <form action="dashboard.html" method="POST">
                        
                        <div class="input-group custom-input-group mb-3">
                            <input type="text" name="username" class="form-control" placeholder="USERNAME" required>
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        </div>
                        
                        <div class="input-group custom-input-group mb-4">
                            <input type="password" name="password" class="form-control" placeholder="PASSWORD" required>
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        </div>
                        
                        <button type="submit" class="btn btn-login">LOG IN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
